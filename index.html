<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Reading Shelf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --wood-dark: #1a0e05;
      --wood-mid: #2d1a0a;
      --wood-light: #3d2410;
      --wood-plank: #4a2e12;
      --wood-edge: #6b3e18;
      --wood-shine: #8B5E2A;
      --gold: #c9a84c;
      --gold-dim: #8a6a28;
      --gold-bright: #f0cc70;
      --candle: #f5c842;
      --candle-glow: rgba(245,180,40,0.12);
      --parchment: #f2e0c0;
      --parchment-dim: #c8a878;
      --ink: #1a0e05;
      --panel-dark: #120a03;
      --panel-mid: #1e1108;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: var(--panel-dark);
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: var(--parchment);
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      position: relative;
      cursor: default;
    }

    /* Wood panel background */
    .room {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        /* Vertical panel lines */
        repeating-linear-gradient(
          90deg,
          transparent 0px,
          transparent 118px,
          rgba(0,0,0,0.35) 118px,
          rgba(0,0,0,0.35) 120px,
          rgba(255,255,255,0.015) 120px,
          rgba(255,255,255,0.015) 122px,
          transparent 122px,
          transparent 240px
        ),
        /* Wood grain horizontal */
        repeating-linear-gradient(
          180deg,
          transparent 0px,
          transparent 3px,
          rgba(0,0,0,0.04) 3px,
          rgba(0,0,0,0.04) 4px
        ),
        /* Base wood gradient */
        linear-gradient(160deg, #1e1208 0%, #160e06 30%, #1a1108 60%, #120a04 100%);
      pointer-events: none;
    }

    /* Panel molding top */
    .room::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: linear-gradient(180deg, #8B5E2A 0%, #4a2e12 40%, transparent 100%);
      box-shadow: 0 2px 12px rgba(0,0,0,0.6);
    }

    /* Candle glow — left */
    .glow-left {
      position: fixed;
      top: -10%;
      left: -5%;
      width: 500px;
      height: 600px;
      background: radial-gradient(ellipse at center, rgba(245,160,30,0.09) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
      animation: flicker 6s ease-in-out infinite;
    }

    /* Candle glow — right */
    .glow-right {
      position: fixed;
      top: -10%;
      right: -5%;
      width: 500px;
      height: 600px;
      background: radial-gradient(ellipse at center, rgba(245,160,30,0.07) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
      animation: flicker 8s ease-in-out infinite reverse;
    }

    /* Center warm glow */
    .glow-center {
      position: fixed;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 400px;
      background: radial-gradient(ellipse at top, rgba(200,130,20,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; transform: scale(1); }
      25% { opacity: 0.85; transform: scale(1.02); }
      50% { opacity: 0.95; transform: scale(0.98); }
      75% { opacity: 0.9; transform: scale(1.01); }
    }

    /* Vignette */
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.65) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* All content above background */
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 56px 24px 44px;
      position: relative;
    }

    /* Decorative top rule */
    header::before {
      content: '';
      display: block;
      width: 180px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
      margin: 0 auto 20px;
    }

    .eyebrow {
      color: var(--gold-dim);
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.45em;
      margin-bottom: 16px;
      animation: glow-text 5s ease-in-out infinite;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(26px, 5vw, 48px);
      font-weight: 700;
      color: var(--parchment);
      letter-spacing: 0.04em;
      text-shadow:
        0 0 40px rgba(200,150,40,0.25),
        0 2px 4px rgba(0,0,0,0.8);
      line-height: 1.1;
    }

    .subtitle {
      font-family: 'IM Fell English', Georgia, serif;
      font-style: italic;
      color: var(--gold-dim);
      font-size: 14px;
      margin-top: 10px;
      letter-spacing: 0.05em;
    }

    /* Decorative divider */
    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin: 18px auto 0;
      width: 280px;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim));
    }
    .divider-line:last-child {
      background: linear-gradient(90deg, var(--gold-dim), transparent);
    }
    .divider-diamond {
      color: var(--gold-dim);
      font-size: 8px;
      letter-spacing: 4px;
    }

    .stats {
      color: var(--gold-dim);
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.2em;
      margin-top: 14px;
    }

    @keyframes glow-text {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* ── ADD BOOK ── */
    .add-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 24px 56px;
      gap: 10px;
    }

    .add-row {
      display: flex;
      width: 100%;
      max-width: 500px;
      background: rgba(10,6,2,0.7);
      border: 1px solid var(--gold-dim);
      border-radius: 2px;
      overflow: hidden;
      box-shadow:
        0 4px 24px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,220,100,0.05),
        0 0 0 3px rgba(0,0,0,0.3);
    }

    #book-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 14px 20px;
      color: var(--parchment);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 16px;
      font-style: italic;
    }
    #book-input:focus { outline: none; }
    #book-input::placeholder { color: var(--gold-dim); opacity: 0.5; font-style: italic; }

    #add-btn {
      background: linear-gradient(135deg, #5a3510, #3d2008);
      border: none;
      border-left: 1px solid var(--gold-dim);
      padding: 14px 24px;
      color: var(--gold);
      cursor: pointer;
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.2em;
      white-space: nowrap;
      transition: all 0.2s;
    }
    #add-btn:hover { background: linear-gradient(135deg, #6b4018, #4a2810); color: var(--gold-bright); }
    #add-btn:disabled { opacity: 0.5; cursor: wait; }

    .error-msg {
      color: #c47a7a;
      font-family: 'IM Fell English', Georgia, serif;
      font-style: italic;
      font-size: 13px;
      display: none;
    }

    /* ── SHELF SECTION ── */
    .shelf-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 0 0;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 60px 24px;
      color: var(--gold-dim);
      opacity: 0.5;
    }
    .empty-icon { font-size: 44px; }
    .empty-state p:first-of-type { font-family: 'IM Fell English', serif; font-style: italic; font-size: 20px; }
    .empty-state p:last-of-type { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.2em; }

    /* Books row */
    .books-row {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      padding: 0 40px;
      gap: 1px;
    }

    /* ── BOOK SPINE ── */
    .spine {
      align-self: flex-end;
      flex-shrink: 0;
      cursor: pointer;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease, filter 0.3s ease;
      border-radius: 0 1px 1px 0;
    }

    .spine:hover {
      filter: brightness(1.15);
      transform: translateY(-6px);
    }

    .spine.selected {
      transform: translateY(-20px) !important;
      filter: brightness(1.2);
    }

    /* Spine leather texture */
    .spine-texture {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          to bottom,
          transparent,
          transparent 4px,
          rgba(0,0,0,0.06) 4px,
          rgba(0,0,0,0.06) 5px
        );
    }

    /* Gold band top */
    .spine-band-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 10px;
      border-bottom: 1px solid rgba(0,0,0,0.3);
    }

    /* Gold band bottom */
    .spine-band-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 10px;
      border-top: 1px solid rgba(0,0,0,0.3);
    }

    /* Gold decorative line near top */
    .spine-line-top {
      position: absolute;
      top: 14px; left: 4px; right: 4px;
      height: 1px;
      background: rgba(200,160,60,0.25);
    }

    .spine-line-bottom {
      position: absolute;
      bottom: 14px; left: 4px; right: 4px;
      height: 1px;
      background: rgba(200,160,60,0.25);
    }

    .spine-title {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-shadow: 0 1px 3px rgba(0,0,0,0.7);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      padding: 2px 0;
      line-height: 1;
      position: relative;
      z-index: 1;
    }

    /* ── SHELF PLANK ── */
    .shelf-wrap {
      position: relative;
    }

    /* Shelf front face */
    .shelf-front {
      height: 28px;
      position: relative;
      background: linear-gradient(180deg,
        #7a5028 0%,
        #5c3a18 20%,
        #4a2e12 60%,
        #3a2208 100%
      );
      border-top: 2px solid #a06830;
      box-shadow:
        0 8px 40px rgba(0,0,0,0.8),
        0 2px 0 rgba(255,200,100,0.08),
        inset 0 1px 0 rgba(255,210,120,0.15),
        inset 0 -1px 0 rgba(0,0,0,0.4);
      overflow: hidden;
    }

    /* Wood grain on shelf */
    .shelf-front::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 30px,
        rgba(0,0,0,0.06) 30px,
        rgba(0,0,0,0.06) 31px
      );
    }

    /* Shelf highlight streak */
    .shelf-front::after {
      content: '';
      position: absolute;
      top: 2px; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent 0%, rgba(255,210,120,0.12) 30%, rgba(255,210,120,0.08) 70%, transparent 100%);
    }

    /* Shelf shadow underneath */
    .shelf-shadow {
      height: 50px;
      background: linear-gradient(180deg, rgba(0,0,0,0.55) 0%, transparent 100%);
    }

    /* Shelf side bracket effect */
    .shelf-bracket-left,
    .shelf-bracket-right {
      position: absolute;
      top: -20px;
      width: 16px;
      height: 50px;
      background: linear-gradient(90deg, #3a2208, #5c3a18);
      border-top: 1px solid #7a5028;
    }
    .shelf-bracket-left { left: 20px; border-radius: 2px 0 0 2px; }
    .shelf-bracket-right { right: 20px; border-radius: 0 2px 2px 0; }

    /* ── READ LIST ── */
    .read-list {
      padding: 24px 40px 32px;
      border-top: 1px solid rgba(139,94,42,0.15);
      display: none;
    }

    .read-label {
      color: var(--gold-dim);
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.3em;
      margin-bottom: 12px;
    }

    .read-tags { display: flex; flex-wrap: wrap; gap: 8px; }

    .read-tag {
      background: rgba(10,6,2,0.5);
      border: 1px solid rgba(139,94,42,0.2);
      color: var(--gold-dim);
      font-family: 'IM Fell English', Georgia, serif;
      font-style: italic;
      font-size: 13px;
      padding: 4px 14px;
      border-radius: 1px;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(5,2,0,0.88);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadein 0.25s ease;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      width: 100%;
      max-width: 600px;
      background:
        repeating-linear-gradient(
          90deg,
          transparent 0px,
          transparent 59px,
          rgba(0,0,0,0.12) 59px,
          rgba(0,0,0,0.12) 60px
        ),
        linear-gradient(160deg, #1e1208 0%, #261808 50%, #1a1005 100%);
      border: 1px solid var(--gold-dim);
      border-radius: 2px;
      overflow: hidden;
      box-shadow:
        0 50px 120px rgba(0,0,0,0.9),
        0 0 0 1px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,210,100,0.08);
      animation: slideup 0.35s cubic-bezier(0.34,1.56,0.64,1);
      max-height: 90vh;
      display: flex;
      flex-direction: column;
    }

    /* Top gold bar */
    .modal-bar {
      height: 3px;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold), var(--gold-bright), var(--gold), var(--gold-dim));
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      border-bottom: 1px solid rgba(139,94,42,0.2);
    }

    .modal-label {
      color: var(--gold-dim);
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.3em;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--gold-dim);
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
      transition: color 0.15s;
      font-family: serif;
    }
    .modal-close:hover { color: var(--parchment); }

    .modal-body {
      display: flex;
      gap: 28px;
      padding: 32px 28px;
      overflow-y: auto;
      flex: 1;
    }

    /* Book cover */
    .book-cover {
      flex-shrink: 0;
      width: 135px;
      height: 200px;
      border-radius: 1px 5px 5px 1px;
      overflow: hidden;
      box-shadow:
        6px 8px 28px rgba(0,0,0,0.7),
        inset -3px 0 10px rgba(0,0,0,0.3),
        inset 2px 0 4px rgba(255,255,255,0.05);
      position: relative;
    }

    .book-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .cover-fallback {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 14px;
      text-align: center;
    }

    .cover-fallback span:first-child { font-size: 26px; margin-bottom: 10px; }

    .cover-fallback-title {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      font-weight: 600;
      line-height: 1.4;
      letter-spacing: 0.04em;
    }

    .cover-fallback-author {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 9px;
      margin-top: 8px;
      opacity: 0.7;
    }

    /* Cover decorative lines */
    .cover-deco-top, .cover-deco-bottom {
      position: absolute;
      left: 10px; right: 10px;
      height: 1px;
      background: rgba(255,255,255,0.15);
    }
    .cover-deco-top { top: 12px; }
    .cover-deco-bottom { bottom: 12px; }

    /* Book info */
    .book-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
    }

    .book-title-lg {
      color: var(--parchment);
      font-family: 'Cinzel', serif;
      font-size: 19px;
      font-weight: 600;
      line-height: 1.3;
    }

    .book-author-lg {
      color: var(--gold-dim);
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 15px;
      font-style: italic;
      margin-top: -8px;
    }

    .tags { display: flex; gap: 8px; flex-wrap: wrap; }

    .tag {
      font-size: 9px;
      font-family: 'Cinzel', serif;
      letter-spacing: 0.15em;
      padding: 4px 12px;
      border-radius: 1px;
    }

    .tag-genre {
      border: 1px solid;
    }

    .tag-meta {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(139,94,42,0.2);
      color: var(--gold-dim);
    }

    .synopsis {
      color: var(--parchment-dim);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 15px;
      line-height: 1.75;
    }

    /* Decorative quote mark */
    .synopsis::before {
      content: '"';
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 40px;
      color: var(--gold-dim);
      opacity: 0.3;
      line-height: 0;
      vertical-align: -16px;
      margin-right: 4px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: auto;
      padding-top: 10px;
      flex-wrap: wrap;
      border-top: 1px solid rgba(139,94,42,0.12);
    }

    .btn-read {
      background: linear-gradient(135deg, #1e3d26, #2a5434);
      border: 1px solid rgba(80,160,80,0.2);
      color: #90c890;
      padding: 10px 20px;
      border-radius: 1px;
      cursor: pointer;
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.15em;
      transition: filter 0.15s;
    }
    .btn-read:hover { filter: brightness(1.2); }

    .btn-remove {
      background: transparent;
      border: 1px solid rgba(160,60,60,0.2);
      color: #a07070;
      padding: 10px 20px;
      border-radius: 1px;
      cursor: pointer;
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.15em;
      transition: filter 0.15s;
    }
    .btn-remove:hover { filter: brightness(1.2); }

    /* ── ANIMATIONS ── */
    @keyframes fadein { from { opacity: 0 } to { opacity: 1 } }
    @keyframes slideup { from { opacity: 0; transform: translateY(30px) } to { opacity: 1; transform: translateY(0) } }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gold-dim); opacity: 0.3; border-radius: 2px; }
  </style>
</head>
<body>

  <!-- Background room -->
  <div class="room"></div>
  <div class="glow-left"></div>
  <div class="glow-right"></div>
  <div class="glow-center"></div>
  <div class="vignette"></div>

  <div class="content">

    <header>
      <p class="eyebrow">✦ &nbsp; A Private Collection &nbsp; ✦</p>
      <h1>The Reading Shelf</h1>
      <p class="subtitle">Books yet to be read, waiting in their proper place</p>
      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-diamond">◆ ◆ ◆</span>
        <div class="divider-line"></div>
      </div>
      <p class="stats" id="stats">0 volumes waiting · 0 finished</p>
    </header>

    <div class="add-area">
      <div class="add-row">
        <input id="book-input" type="text" placeholder="Enter a title to add to your collection..." autocomplete="off" />
        <button id="add-btn">ADD TO SHELF</button>
      </div>
      <p class="error-msg" id="error-msg"></p>
    </div>

    <div class="shelf-section">
      <div id="empty-state" class="empty-state">
        <span class="empty-icon">📚</span>
        <p>The shelf stands empty</p>
        <p>ADD A VOLUME ABOVE TO BEGIN YOUR COLLECTION</p>
      </div>

      <div id="books-row" class="books-row" style="display:none;"></div>

      <div class="shelf-wrap">
        <div class="shelf-bracket-left"></div>
        <div class="shelf-bracket-right"></div>
        <div class="shelf-front"></div>
        <div class="shelf-shadow"></div>
      </div>
    </div>

    <div class="read-list" id="read-list">
      <p class="read-label">✦ &nbsp; Volumes Read &nbsp; ✦</p>
      <div class="read-tags" id="read-tags"></div>
    </div>

  </div><!-- /content -->

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-bar"></div>
      <div class="modal-header">
        <span class="modal-label">✦ &nbsp; CATALOGUE ENTRY &nbsp; ✦</span>
        <button class="modal-close" id="modal-close">×</button>
      </div>
      <div class="modal-body">
        <div class="book-cover" id="modal-cover">
          <img id="modal-cover-img" src="" alt="" />
          <div class="cover-fallback" id="modal-cover-fallback">
            <div class="cover-deco-top"></div>
            <span>📖</span>
            <span class="cover-fallback-title" id="fallback-title"></span>
            <span class="cover-fallback-author" id="fallback-author"></span>
            <div class="cover-deco-bottom"></div>
          </div>
        </div>
        <div class="book-info">
          <div>
            <div class="book-title-lg" id="modal-title"></div>
            <div class="book-author-lg" id="modal-author"></div>
          </div>
          <div class="tags" id="modal-tags"></div>
          <p class="synopsis" id="modal-synopsis"></p>
          <div class="modal-actions">
            <button class="btn-read" id="btn-read">✓ &nbsp; MARK AS READ</button>
            <button class="btn-remove" id="btn-remove">✕ &nbsp; REMOVE</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SPINE_COLORS = [
      { spine: "#5c1a1a", light: "#8B2020", text: "#f5d5c0", band: "#7a2a2a" },
      { spine: "#1a3a5c", light: "#1e5080", text: "#c8dff0", band: "#2a4a70" },
      { spine: "#1e4a2a", light: "#266634", text: "#c0e8c8", band: "#2a5e34" },
      { spine: "#3a2a0a", light: "#6a4e10", text: "#f0dfa0", band: "#5a4010" },
      { spine: "#3a1a3a", light: "#602060", text: "#e8c8f0", band: "#502050" },
      { spine: "#1a2a4a", light: "#223a6a", text: "#c0d0f0", band: "#2a3a5a" },
      { spine: "#4a1a10", light: "#7a2818", text: "#f0c8b8", band: "#6a2018" },
      { spine: "#1a3a3a", light: "#1e5858", text: "#b8e8e8", band: "#1e4848" },
      { spine: "#2a1a0a", light: "#4a3010", text: "#f0dcc0", band: "#3a2810" },
      { spine: "#3a3a10", light: "#5a5a18", text: "#f0f0b8", band: "#484818" },
      { spine: "#2a0a2a", light: "#501050", text: "#e8b8e8", band: "#401040" },
      { spine: "#0a2a1a", light: "#104a30", text: "#b8e8d0", band: "#103a28" },
    ];

    function getColor(i) { return SPINE_COLORS[i % SPINE_COLORS.length]; }

    let books = [];
    let readBooks = [];
    let selectedId = null;

    function load() {
      try { books = JSON.parse(localStorage.getItem("tbr-books-v3") || "[]"); } catch { books = []; }
      try { readBooks = JSON.parse(localStorage.getItem("tbr-read-v3") || "[]"); } catch { readBooks = []; }
    }

    function save() {
      try {
        localStorage.setItem("tbr-books-v3", JSON.stringify(books));
        localStorage.setItem("tbr-read-v3", JSON.stringify(readBooks));
      } catch {}
    }

    function updateStats() {
      const n = books.length;
      const r = readBooks.length;
      document.getElementById("stats").textContent =
        `${n} volume${n !== 1 ? "s" : ""} waiting · ${r} finished`;
    }

    function showError(msg) {
      const el = document.getElementById("error-msg");
      el.textContent = msg;
      el.style.display = msg ? "block" : "none";
    }

    async function lookupBook(title) {
      const res = await fetch(
        `https://openlibrary.org/search.json?title=${encodeURIComponent(title)}&limit=1&fields=key,title,author_name,first_publish_year,number_of_pages_median,cover_i,subject`
      );
      const data = await res.json();
      const doc = data.docs?.[0];
      if (!doc) throw new Error("Not found");

      let synopsis = "";
      if (doc.key) {
        try {
          const workRes = await fetch(`https://openlibrary.org${doc.key}.json`);
          const workData = await workRes.json();
          const desc = workData.description;
          synopsis = typeof desc === "string" ? desc : (desc?.value || "");
          if (synopsis.length > 600) synopsis = synopsis.slice(0, 600).replace(/\s+\S*$/, "") + "...";
        } catch {}
      }

      return {
        id: Date.now(),
        title: doc.title || title,
        author: doc.author_name?.[0] || "",
        year: doc.first_publish_year || null,
        pages: doc.number_of_pages_median || null,
        coverId: doc.cover_i || null,
        synopsis: synopsis || "No description is recorded for this volume.",
        genre: doc.subject?.find(s => s.length < 30) || doc.subject?.[0] || "",
      };
    }

    function createSpine(book, index) {
      const color = getColor(index);
      const seed = book.title.length + index;
      const height = 175 + (seed * 13 % 55);
      const width = 30 + (seed * 7 % 26);

      const el = document.createElement("div");
      el.className = "spine";
      el.dataset.id = book.id;
      el.title = `${book.title}${book.author ? " — " + book.author : ""}`;
      el.style.cssText = `
        width:${width}px; height:${height}px;
        background: linear-gradient(105deg,
          ${color.light}33 0%,
          ${color.spine} 12%,
          ${color.spine} 88%,
          rgba(0,0,0,0.5) 100%
        );
        border-left: 2px solid ${color.light}44;
        border-right: 3px solid rgba(0,0,0,0.6);
        border-top: 1px solid ${color.light}33;
        box-shadow: 2px 0 10px rgba(0,0,0,0.5), inset 1px 0 0 ${color.light}22;
      `;

      const texture = document.createElement("div");
      texture.className = "spine-texture";

      const bandTop = document.createElement("div");
      bandTop.className = "spine-band-top";
      bandTop.style.background = `linear-gradient(180deg, ${color.band}cc, ${color.spine})`;

      const bandBottom = document.createElement("div");
      bandBottom.className = "spine-band-bottom";
      bandBottom.style.background = `linear-gradient(0deg, ${color.band}cc, ${color.spine})`;

      const lineTop = document.createElement("div");
      lineTop.className = "spine-line-top";

      const lineBottom = document.createElement("div");
      lineBottom.className = "spine-line-bottom";

      const titleEl = document.createElement("span");
      titleEl.className = "spine-title";
      titleEl.style.color = color.text;
      titleEl.style.maxWidth = `${height - 28}px`;
      titleEl.textContent = book.title;

      el.append(texture, bandTop, bandBottom, lineTop, lineBottom, titleEl);
      el.addEventListener("click", () => openModal(book.id));
      return el;
    }

    function renderShelf() {
      const row = document.getElementById("books-row");
      const empty = document.getElementById("empty-state");
      row.innerHTML = "";

      if (books.length === 0) {
        empty.style.display = "flex";
        row.style.display = "none";
      } else {
        empty.style.display = "none";
        row.style.display = "flex";
        books.forEach((book, i) => row.appendChild(createSpine(book, i)));
      }

      updateStats();
      renderReadList();
    }

    function renderReadList() {
      const list = document.getElementById("read-list");
      const tags = document.getElementById("read-tags");
      if (readBooks.length === 0) { list.style.display = "none"; return; }
      list.style.display = "block";
      tags.innerHTML = "";
      readBooks.forEach(b => {
        const tag = document.createElement("span");
        tag.className = "read-tag";
        tag.textContent = `✦ ${b.title}`;
        tags.appendChild(tag);
      });
    }

    function openModal(id) {
      if (selectedId === id) { closeModal(); return; }
      selectedId = id;

      document.querySelectorAll(".spine").forEach(s => s.classList.remove("selected"));
      const spineEl = document.querySelector(`.spine[data-id="${id}"]`);
      if (spineEl) spineEl.classList.add("selected");

      const book = books.find(b => b.id === id);
      if (!book) return;
      const index = books.indexOf(book);
      const color = getColor(index);

      document.getElementById("modal-title").textContent = book.title;
      document.getElementById("modal-author").textContent = book.author ? `by ${book.author}` : "";
      document.getElementById("modal-synopsis").textContent = book.synopsis || "";

      const img = document.getElementById("modal-cover-img");
      const fallback = document.getElementById("modal-cover-fallback");
      document.getElementById("fallback-title").textContent = book.title;
      document.getElementById("fallback-author").textContent = book.author || "";
      fallback.style.background = `linear-gradient(145deg, ${color.light}, ${color.spine})`;
      fallback.querySelector(".cover-fallback-title").style.color = color.text;
      fallback.querySelector(".cover-fallback-author").style.color = color.text;

      if (book.coverId) {
        img.src = `https://covers.openlibrary.org/b/id/${book.coverId}-M.jpg`;
        img.style.display = "block";
        fallback.style.display = "none";
        img.onerror = () => { img.style.display = "none"; fallback.style.display = "flex"; };
      } else {
        img.style.display = "none";
        fallback.style.display = "flex";
      }

      const tagsEl = document.getElementById("modal-tags");
      tagsEl.innerHTML = "";

      if (book.genre) {
        const g = document.createElement("span");
        g.className = "tag tag-genre";
        g.style.cssText = `background:${color.spine}66; border-color:${color.light}55; color:${color.text};`;
        g.textContent = book.genre.toUpperCase().slice(0, 28);
        tagsEl.appendChild(g);
      }

      [book.pages && `${book.pages} pages`, book.year && `${book.year}`].filter(Boolean).forEach(t => {
        const s = document.createElement("span");
        s.className = "tag tag-meta";
        s.textContent = t;
        tagsEl.appendChild(s);
      });

      document.getElementById("btn-read").onclick = () => markRead(id);
      document.getElementById("btn-remove").onclick = () => removeBook(id);

      document.getElementById("modal-overlay").classList.add("open");
    }

    function closeModal() {
      selectedId = null;
      document.querySelectorAll(".spine").forEach(s => s.classList.remove("selected"));
      document.getElementById("modal-overlay").classList.remove("open");
    }

    function markRead(id) {
      const book = books.find(b => b.id === id);
      if (!book) return;
      books = books.filter(b => b.id !== id);
      readBooks = [...readBooks, { ...book, readAt: new Date().toLocaleDateString() }];
      save(); closeModal(); renderShelf();
    }

    function removeBook(id) {
      books = books.filter(b => b.id !== id);
      save(); closeModal(); renderShelf();
    }

    async function addBook() {
      const input = document.getElementById("book-input");
      const btn = document.getElementById("add-btn");
      const title = input.value.trim();
      if (!title) return;

      if (books.find(b => b.title.toLowerCase() === title.toLowerCase())) {
        showError("This volume already rests upon your shelf."); return;
      }

      btn.disabled = true;
      btn.textContent = "CONSULTING THE CATALOGUE...";
      showError("");

      try {
        const book = await lookupBook(title);
        books = [...books, book];
        save(); input.value = ""; renderShelf();
      } catch {
        books = [...books, {
          id: Date.now(), title, author: "", genre: "",
          synopsis: "No record of this volume was found in the catalogue.",
          pages: null, coverId: null, year: null
        }];
        save(); input.value = ""; renderShelf();
        showError(`"${title}" was not found in the catalogue — added without details.`);
      }

      btn.disabled = false;
      btn.textContent = "ADD TO SHELF";
    }

    document.getElementById("add-btn").addEventListener("click", addBook);
    document.getElementById("book-input").addEventListener("keydown", e => { if (e.key === "Enter") addBook(); });
    document.getElementById("modal-close").addEventListener("click", closeModal);
    document.getElementById("modal-overlay").addEventListener("click", e => { if (e.target === document.getElementById("modal-overlay")) closeModal(); });
    document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

    load();
    renderShelf();
  </script>
</body>
</html>
