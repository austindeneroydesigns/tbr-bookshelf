<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Reading Shelf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #080502 0%, #120e05 35%, #1a1308 65%, #0f0b04 100%);
      font-family: 'Playfair Display', Georgia, serif;
      color: #f5e6cc;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: 25%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 250px;
      background: radial-gradient(ellipse, #8B450012 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      text-align: center;
      padding: 52px 24px 40px;
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      color: #6b4c2a;
      font-family: monospace;
      font-size: 10px;
      letter-spacing: 0.35em;
      margin-bottom: 14px;
      animation: glow 4s ease-in-out infinite;
    }

    h1 {
      font-size: clamp(28px, 6vw, 52px);
      font-weight: 700;
      text-shadow: 0 2px 30px rgba(139,69,19,0.3);
      line-height: 1.1;
    }

    .stats {
      color: #4a3318;
      margin-top: 12px;
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
    }

    /* Add book */
    .add-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 24px 52px;
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    .add-row {
      display: flex;
      width: 100%;
      max-width: 460px;
      background: #100c06;
      border: 1px solid #6b4c2a28;
      border-radius: 3px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    #book-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 14px 18px;
      color: #f5e6cc;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 15px;
    }
    #book-input:focus { outline: none; }
    #book-input::placeholder { color: #4a3318; }

    #add-btn {
      background: linear-gradient(135deg, #7B3F00, #5a2e00);
      border: none;
      padding: 14px 22px;
      color: #FDEBD0;
      cursor: pointer;
      font-family: monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      white-space: nowrap;
      border-left: 1px solid #6b4c2a1a;
      transition: filter 0.2s;
    }
    #add-btn:hover { filter: brightness(1.2); }
    #add-btn:disabled { opacity: 0.4; cursor: wait; }

    .error-msg {
      color: #c47a7a;
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-align: center;
      max-width: 460px;
      display: none;
    }

    /* Shelf area */
    .shelf-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      position: relative;
      z-index: 1;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 60px 24px;
      color: #3a2a12;
    }

    .empty-icon { font-size: 48px; opacity: 0.3; }

    .empty-state p:first-of-type {
      font-size: 18px;
      font-style: italic;
    }

    .empty-state p:last-of-type {
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      opacity: 0.6;
    }

    .books-row {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      padding: 0 28px;
      gap: 2px;
    }

    /* Book spines */
    .spine {
      align-self: flex-end;
      flex-shrink: 0;
      cursor: pointer;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 1px 2px 1px 1px;
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease;
    }

    .spine.selected {
      transform: translateY(-16px) !important;
      box-shadow: 3px 0 18px rgba(0,0,0,0.6), -1px 0 6px rgba(0,0,0,0.3) !important;
    }

    .spine-texture {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(to bottom, transparent, transparent 6px, rgba(0,0,0,0.04) 6px, rgba(0,0,0,0.04) 7px);
    }

    .spine-top, .spine-bottom {
      position: absolute;
      left: 0;
      right: 0;
      height: 8px;
    }

    .spine-top { top: 0; }
    .spine-bottom { bottom: 0; }

    .spine-title {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      font-size: 10.5px;
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      padding: 2px 0;
      line-height: 1;
    }

    /* Shelf plank */
    .shelf-plank {
      height: 22px;
      background: linear-gradient(180deg, #6B4423 0%, #4A2E12 45%, #2C1A08 100%);
      border-top: 2px solid #9B6B35;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,210,130,0.1);
      position: relative;
      overflow: hidden;
    }

    .shelf-plank::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(0,0,0,0.05) 60px, rgba(0,0,0,0.05) 61px);
    }

    .shelf-shadow {
      height: 40px;
      background: linear-gradient(180deg, rgba(0,0,0,0.45) 0%, transparent 100%);
    }

    /* Read list */
    .read-list {
      padding: 20px 32px 28px;
      border-top: 1px solid #6b4c2a10;
      display: none;
      position: relative;
      z-index: 1;
    }

    .read-label {
      color: #4a3318;
      font-family: monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      margin-bottom: 10px;
    }

    .read-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .read-tag {
      background: #12100a;
      border: 1px solid #6b4c2a1a;
      color: #5a3d20;
      font-family: Georgia, serif;
      font-size: 12px;
      font-style: italic;
      padding: 4px 12px;
      border-radius: 2px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(5,3,1,0.82);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadein 0.2s ease;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      width: 100%;
      max-width: 580px;
      background: linear-gradient(160deg, #1c1208 0%, #251a0a 60%, #1c1208 100%);
      border: 1px solid #6b4c2a33;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 40px 100px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.03);
      animation: slideup 0.3s cubic-bezier(0.34,1.56,0.64,1);
      max-height: 90vh;
      display: flex;
      flex-direction: column;
    }

    .modal-bar { height: 4px; }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid #ffffff08;
    }

    .modal-label {
      color: #6b4c2a;
      font-family: monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
    }

    .modal-close {
      background: none;
      border: none;
      color: #6b4c2a;
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
      transition: color 0.15s;
    }
    .modal-close:hover { color: #f5e6cc; }

    .modal-body {
      display: flex;
      gap: 24px;
      padding: 28px;
      overflow-y: auto;
      flex: 1;
    }

    .book-cover {
      flex-shrink: 0;
      width: 130px;
      height: 195px;
      border-radius: 2px 6px 6px 2px;
      overflow: hidden;
      box-shadow: 6px 6px 24px rgba(0,0,0,0.6);
      position: relative;
    }

    .book-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .cover-fallback {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px;
      text-align: center;
    }

    .cover-fallback span:first-child { font-size: 28px; margin-bottom: 8px; }
    .cover-fallback .cover-title { font-size: 11px; font-weight: 700; line-height: 1.3; }
    .cover-fallback .cover-author { font-size: 9px; font-style: italic; margin-top: 6px; opacity: 0.7; }

    .book-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
    }

    .book-title-lg {
      color: #f5e6cc;
      font-size: 20px;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 4px;
    }

    .book-author-lg {
      color: #9b7a55;
      font-family: Georgia, serif;
      font-size: 14px;
      font-style: italic;
    }

    .tags { display: flex; gap: 8px; flex-wrap: wrap; }

    .tag {
      font-size: 9px;
      font-family: monospace;
      letter-spacing: 0.15em;
      padding: 3px 10px;
      border-radius: 2px;
    }

    .tag-genre { }
    .tag-meta { background: #ffffff08; border: 1px solid #ffffff11; color: #7a6040; }

    .synopsis {
      color: #c0a070;
      font-family: Georgia, serif;
      font-size: 14px;
      line-height: 1.7;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: auto;
      padding-top: 8px;
      flex-wrap: wrap;
    }

    .btn-read {
      background: linear-gradient(135deg, #1e4d2b, #2d6b3e);
      border: 1px solid #3a8a4a33;
      color: #90d4a0;
      padding: 9px 18px;
      border-radius: 3px;
      cursor: pointer;
      font-family: monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      transition: filter 0.15s;
    }
    .btn-read:hover { filter: brightness(1.2); }

    .btn-remove {
      background: transparent;
      border: 1px solid #8a3a3a33;
      color: #b07070;
      padding: 9px 18px;
      border-radius: 3px;
      cursor: pointer;
      font-family: monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      transition: filter 0.15s;
    }
    .btn-remove:hover { filter: brightness(1.2); }

    @keyframes fadein { from { opacity: 0 } to { opacity: 1 } }
    @keyframes slideup { from { opacity: 0; transform: translateY(24px) } to { opacity: 1; transform: translateY(0) } }
    @keyframes glow { 0%,100% { opacity: 0.4 } 50% { opacity: 0.7 } }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #6b4c2a44; border-radius: 2px; }
  </style>
</head>
<body>

  <header>
    <p class="eyebrow">◆ &nbsp; T O - B E - R E A D &nbsp; ◆</p>
    <h1>The Reading Shelf</h1>
    <p class="stats" id="stats">0 waiting · 0 finished</p>
  </header>

  <div class="add-area">
    <div class="add-row">
      <input id="book-input" type="text" placeholder="Enter a book title..." autocomplete="off" />
      <button id="add-btn">+ ADD</button>
    </div>
    <p class="error-msg" id="error-msg"></p>
  </div>

  <div class="shelf-area">
    <div id="empty-state" class="empty-state">
      <span class="empty-icon">📚</span>
      <p>Your shelf is empty</p>
      <p>ADD A BOOK ABOVE TO GET STARTED</p>
    </div>
    <div id="books-row" class="books-row" style="display:none;"></div>
    <div class="shelf-plank"></div>
    <div class="shelf-shadow"></div>
  </div>

  <div class="read-list" id="read-list">
    <p class="read-label">FINISHED READS</p>
    <div class="read-tags" id="read-tags"></div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-bar" id="modal-bar"></div>
      <div class="modal-header">
        <span class="modal-label">TBR SHELF</span>
        <button class="modal-close" id="modal-close">×</button>
      </div>
      <div class="modal-body">
        <div class="book-cover" id="modal-cover">
          <img id="modal-cover-img" src="" alt="" />
          <div class="cover-fallback" id="modal-cover-fallback">
            <span>📖</span>
            <span class="cover-title" id="fallback-title"></span>
            <span class="cover-author" id="fallback-author"></span>
          </div>
        </div>
        <div class="book-info">
          <div>
            <div class="book-title-lg" id="modal-title"></div>
            <div class="book-author-lg" id="modal-author"></div>
          </div>
          <div class="tags" id="modal-tags"></div>
          <p class="synopsis" id="modal-synopsis"></p>
          <div class="modal-actions">
            <button class="btn-read" id="btn-read">✓ MARK AS READ</button>
            <button class="btn-remove" id="btn-remove">✕ REMOVE</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SPINE_COLORS = [
      { spine: "#7B3F00", light: "#A0522D", text: "#FDEBD0" },
      { spine: "#1B3A6B", light: "#2E5FA3", text: "#D6EAF8" },
      { spine: "#2D6A4F", light: "#40916C", text: "#D8F3DC" },
      { spine: "#6B2D3E", light: "#9B4060", text: "#FADADD" },
      { spine: "#4A3728", light: "#6B5344", text: "#F5E6D3" },
      { spine: "#5C3D99", light: "#7D5BBF", text: "#EDE0FF" },
      { spine: "#7A6020", light: "#B8942E", text: "#FDF3D0" },
      { spine: "#1A5276", light: "#2471A3", text: "#D1ECF1" },
      { spine: "#5D4037", light: "#8D6E63", text: "#EFEBE9" },
      { spine: "#1B5E20", light: "#2E7D32", text: "#C8E6C9" },
      { spine: "#880E4F", light: "#C2185B", text: "#FCE4EC" },
      { spine: "#37474F", light: "#546E7A", text: "#ECEFF1" },
    ];

    function getColor(i) { return SPINE_COLORS[i % SPINE_COLORS.length]; }

    let books = [];
    let readBooks = [];
    let selectedId = null;

    function load() {
      try { books = JSON.parse(localStorage.getItem("tbr-books") || "[]"); } catch { books = []; }
      try { readBooks = JSON.parse(localStorage.getItem("tbr-read") || "[]"); } catch { readBooks = []; }
    }

    function save() {
      try {
        localStorage.setItem("tbr-books", JSON.stringify(books));
        localStorage.setItem("tbr-read", JSON.stringify(readBooks));
      } catch {}
    }

    function updateStats() {
      document.getElementById("stats").textContent = `${books.length} waiting · ${readBooks.length} finished`;
    }

    function showError(msg) {
      const el = document.getElementById("error-msg");
      el.textContent = msg;
      el.style.display = msg ? "block" : "none";
    }

    async function lookupBook(title) {
      const res = await fetch(
        `https://openlibrary.org/search.json?title=${encodeURIComponent(title)}&limit=1&fields=key,title,author_name,first_publish_year,number_of_pages_median,cover_i,subject`
      );
      const data = await res.json();
      const doc = data.docs?.[0];
      if (!doc) throw new Error("Not found");

      let synopsis = "";
      if (doc.key) {
        try {
          const workRes = await fetch(`https://openlibrary.org${doc.key}.json`);
          const workData = await workRes.json();
          const desc = workData.description;
          synopsis = typeof desc === "string" ? desc : (desc?.value || "");
          if (synopsis.length > 600) synopsis = synopsis.slice(0, 600).replace(/\s+\S*$/, "") + "...";
        } catch {}
      }

      return {
        id: Date.now(),
        title: doc.title || title,
        author: doc.author_name?.[0] || "",
        year: doc.first_publish_year || null,
        pages: doc.number_of_pages_median || null,
        coverId: doc.cover_i || null,
        synopsis: synopsis || "No description available.",
        genre: doc.subject?.find(s => s.length < 30) || doc.subject?.[0] || "",
      };
    }

    function createSpine(book, index) {
      const color = getColor(index);
      const seed = book.title.length + index;
      const height = 170 + (seed * 13 % 50);
      const width = 32 + (seed * 7 % 22);

      const el = document.createElement("div");
      el.className = "spine";
      el.dataset.id = book.id;
      el.title = `${book.title}${book.author ? " — " + book.author : ""}`;
      el.style.cssText = `
        width:${width}px; height:${height}px;
        background: linear-gradient(105deg, ${color.light}22 0%, ${color.spine} 15%, ${color.spine} 85%, #00000044 100%);
        border-left: 2px solid ${color.light}55;
        border-right: 3px solid #00000055;
        border-top: 2px solid ${color.light}44;
        box-shadow: 2px 0 8px rgba(0,0,0,0.4);
      `;

      const texture = document.createElement("div");
      texture.className = "spine-texture";

      const top = document.createElement("div");
      top.className = "spine-top";
      top.style.background = `${color.light}55`;

      const bottom = document.createElement("div");
      bottom.className = "spine-bottom";
      bottom.style.background = `${color.light}44`;

      const titleEl = document.createElement("span");
      titleEl.className = "spine-title";
      titleEl.style.color = color.text;
      titleEl.style.maxWidth = `${height - 24}px`;
      titleEl.textContent = book.title;

      el.append(texture, top, bottom, titleEl);
      el.addEventListener("click", () => openModal(book.id));
      return el;
    }

    function renderShelf() {
      const row = document.getElementById("books-row");
      const empty = document.getElementById("empty-state");
      row.innerHTML = "";

      if (books.length === 0) {
        empty.style.display = "flex";
        row.style.display = "none";
      } else {
        empty.style.display = "none";
        row.style.display = "flex";
        books.forEach((book, i) => row.appendChild(createSpine(book, i)));
      }

      updateStats();
      renderReadList();
    }

    function renderReadList() {
      const list = document.getElementById("read-list");
      const tags = document.getElementById("read-tags");
      if (readBooks.length === 0) { list.style.display = "none"; return; }
      list.style.display = "block";
      tags.innerHTML = "";
      readBooks.forEach(b => {
        const tag = document.createElement("span");
        tag.className = "read-tag";
        tag.textContent = `✓ ${b.title}`;
        tags.appendChild(tag);
      });
    }

    function openModal(id) {
      if (selectedId === id) { closeModal(); return; }
      selectedId = id;

      // Update spine selected state
      document.querySelectorAll(".spine").forEach(s => s.classList.remove("selected"));
      const spineEl = document.querySelector(`.spine[data-id="${id}"]`);
      if (spineEl) spineEl.classList.add("selected");

      const book = books.find(b => b.id === id);
      if (!book) return;
      const index = books.indexOf(book);
      const color = getColor(index);

      // Populate modal
      document.getElementById("modal-bar").style.background = `linear-gradient(90deg, ${color.spine}, ${color.light}, ${color.spine})`;
      document.getElementById("modal-title").textContent = book.title;
      document.getElementById("modal-author").textContent = book.author ? `by ${book.author}` : "";
      document.getElementById("modal-synopsis").textContent = book.synopsis || "";

      // Cover
      const img = document.getElementById("modal-cover-img");
      const fallback = document.getElementById("modal-cover-fallback");
      document.getElementById("fallback-title").textContent = book.title;
      document.getElementById("fallback-author").textContent = book.author;
      fallback.style.background = `linear-gradient(145deg, ${color.light}, ${color.spine})`;
      fallback.querySelector(".cover-title").style.color = color.text;
      fallback.querySelector(".cover-author").style.color = color.text;

      if (book.coverId) {
        img.src = `https://covers.openlibrary.org/b/id/${book.coverId}-M.jpg`;
        img.style.display = "block";
        fallback.style.display = "none";
        img.onerror = () => { img.style.display = "none"; fallback.style.display = "flex"; };
      } else {
        img.style.display = "none";
        fallback.style.display = "flex";
      }

      // Tags
      const tagsEl = document.getElementById("modal-tags");
      tagsEl.innerHTML = "";
      if (book.genre) {
        const g = document.createElement("span");
        g.className = "tag tag-genre";
        g.style.cssText = `background:${color.spine}55; border:1px solid ${color.light}44; color:${color.text};`;
        g.textContent = book.genre.toUpperCase().slice(0, 30);
        tagsEl.appendChild(g);
      }
      [book.pages && `${book.pages} PGS`, book.year && `${book.year}`].filter(Boolean).forEach(t => {
        const s = document.createElement("span");
        s.className = "tag tag-meta";
        s.textContent = t;
        tagsEl.appendChild(s);
      });

      // Action buttons
      document.getElementById("btn-read").onclick = () => markRead(id);
      document.getElementById("btn-remove").onclick = () => removeBook(id);

      document.getElementById("modal-overlay").classList.add("open");
    }

    function closeModal() {
      selectedId = null;
      document.querySelectorAll(".spine").forEach(s => s.classList.remove("selected"));
      document.getElementById("modal-overlay").classList.remove("open");
    }

    function markRead(id) {
      const book = books.find(b => b.id === id);
      if (!book) return;
      books = books.filter(b => b.id !== id);
      readBooks = [...readBooks, { ...book, readAt: new Date().toLocaleDateString() }];
      save(); closeModal(); renderShelf();
    }

    function removeBook(id) {
      books = books.filter(b => b.id !== id);
      save(); closeModal(); renderShelf();
    }

    async function addBook() {
      const input = document.getElementById("book-input");
      const btn = document.getElementById("add-btn");
      const title = input.value.trim();
      if (!title) return;
      if (books.find(b => b.title.toLowerCase() === title.toLowerCase())) {
        showError("Already on your shelf!"); return;
      }

      btn.disabled = true;
      btn.textContent = "LOOKING UP...";
      showError("");

      try {
        const book = await lookupBook(title);
        books = [...books, book];
        save(); input.value = ""; renderShelf();
      } catch {
        books = [...books, { id: Date.now(), title, author: "", genre: "", synopsis: "Could not find this book in Open Library.", pages: null, coverId: null, year: null }];
        save(); input.value = ""; renderShelf();
        showError(`"${title}" not found in the database — added with no details.`);
      }

      btn.disabled = false;
      btn.textContent = "+ ADD";
    }

    // Event listeners
    document.getElementById("add-btn").addEventListener("click", addBook);
    document.getElementById("book-input").addEventListener("keydown", e => { if (e.key === "Enter") addBook(); });
    document.getElementById("modal-close").addEventListener("click", closeModal);
    document.getElementById("modal-overlay").addEventListener("click", e => { if (e.target === document.getElementById("modal-overlay")) closeModal(); });
    document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

    // Init
    load();
    renderShelf();
  </script>
</body>
</html>
